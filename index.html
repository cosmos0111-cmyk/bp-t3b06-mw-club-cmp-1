    <style>
        /* ===== CSS RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-size: 100%;
            scroll-behavior: smooth;
        }
        body {
            font-family: Impact, Impact-fallback, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #000000;
            color: #ffffff;
            line-height: 1.2;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        img, svg {
            display: block;
            max-width: 100%;
        }
        a {
            color: inherit;
            text-decoration: none;
        }

        /* ===== SYSTEM MONO FALLBACK ===== */
        @font-face {
            font-family: 'Impact-fallback';
            src: local('Impact'), local('Helvetica Inserat'), local('Arial Black');
            font-weight: 700;
            font-style: normal;
        }
        :root {
            --primary: #000000;
            --secondary: #ffffff;
            --accent: #ff3b00;
            --accent-dim: #cc2e00;
            --font-stack: Impact, 'Impact-fallback', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --border-thick: 4px solid #ffffff;
            --border-accent: 4px solid #ff3b00;
            --space-gap: 48px;
            --space-padding: 72px;
            --space-section: 120px;
        }

        /* ===== TYPOGRAPHY ===== */
        h1 {
            font-size: clamp(3.5rem, 12vw, 6rem);
            font-weight: 700;
            letter-spacing: -0.03em;
            line-height: 0.9;
            text-transform: uppercase;
            color: var(--secondary);
            border-bottom: var(--border-accent);
            display: inline-block;
            padding-bottom: 0.15em;
            margin-bottom: 0.4em;
        }
        h2 {
            font-size: clamp(2.4rem, 8vw, 4rem);
            font-weight: 700;
            letter-spacing: -0.02em;
            line-height: 1;
            text-transform: uppercase;
            color: var(--secondary);
            border-left: var(--border-accent);
            padding-left: 20px;
            margin-bottom: 0.6em;
        }
        h3 {
            font-size: clamp(1.6rem, 5vw, 2.8rem);
            font-weight: 700;
            letter-spacing: -0.01em;
            line-height: 1.1;
            color: var(--secondary);
            margin-bottom: 0.5em;
        }
        p {
            font-size: 1.2rem;
            font-weight: 400;
            line-height: 1.5;
            margin-bottom: 1em;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .accent-text {
            color: var(--accent);
        }
        .oversize {
            font-size: clamp(4rem, 15vw, 8rem);
            font-weight: 700;
            line-height: 0.85;
            letter-spacing: -0.04em;
            text-transform: uppercase;
        }

        /* ===== LAYOUT ===== */
        .container {
            padding-left: var(--space-padding);
            padding-right: var(--space-padding);
            max-width: none;
            width: 100%;
        }
        section {
            padding-top: var(--space-section);
            padding-bottom: var(--space-section);
            border-bottom: 2px solid #222;
        }
        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-gap);
        }
        .grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: var(--space-gap);
        }
        .flex-row {
            display: flex;
            flex-flow: row wrap;
            gap: var(--space-gap);
        }
        .flex-col {
            display: flex;
            flex-flow: column nowrap;
            gap: 24px;
        }

        /* ===== HEADER & NAV ===== */
        header {
            background: var(--primary);
            border-bottom: var(--border-thick);
            padding: 24px var(--space-padding);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent);
            border: var(--border-accent);
            padding: 8px 20px;
            transform: rotate(-2deg);
            display: inline-block;
        }
        .logo span {
            color: var(--secondary);
        }
        nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }
        nav a {
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 8px 4px;
            border-bottom: 3px solid transparent;
            transition: border-color 0.2s;
        }
        nav a:hover,
        nav a:focus {
            border-bottom-color: var(--accent);
            color: var(--accent);
        }
        .nav-phone {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--accent);
            border: 3px solid var(--accent);
            padding: 8px 24px;
            transform: rotate(1deg);
            transition: background 0.2s, color 0.2s;
        }
        .nav-phone:hover {
            background: var(--accent);
            color: var(--primary);
        }

        /* ===== HAMBURGER (mobile) ===== */
        .hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 48px;
            height: 48px;
            background: transparent;
            border: 3px solid var(--secondary);
            cursor: pointer;
            padding: 8px;
            gap: 6px;
        }
        .hamburger span {
            display: block;
            width: 100%;
            height: 4px;
            background: var(--secondary);
            transition: all 0.3s;
        }
        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(7px, 7px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* ===== HERO ===== */
        .hero {
            padding-top: clamp(60px, 12vh, 140px);
            padding-bottom: clamp(60px, 12vh, 140px);
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -10%;
            width: 60%;
            height: 140%;
            background: repeating-linear-gradient(
                45deg,
                rgba(255,59,0,0.06) 0px,
                rgba(255,59,0,0.06) 20px,
                rgba(255,255,255,0.02) 20px,
                rgba(255,255,255,0.02) 40px
            );
            transform: skewX(-12deg);
            pointer-events: none;
            z-index: 0;
        }
        .hero-content {
            position: relative;
            z-index: 1;
        }
        .hero h1 {
            margin-bottom: 0.3em;
            max-width: 8ch;
        }
        .hero .hero-sub {
            font-size: clamp(1.2rem, 3vw, 2rem);
            font-weight: 400;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #ccc;
            max-width: 30ch;
            margin-bottom: 48px;
            border-left: 4px solid var(--accent);
            padding-left: 24px;
        }
        .hero-stats {
            display: flex;
            gap: 48px;
            flex-wrap: wrap;
            margin-top: 40px;
        }
        .hero-stat {
            border: 4px solid var(--accent);
            padding: 24px 32px;
            min-width: 160px;
            transform: rotate(-1deg);
            background: rgba(0,0,0,0.6);
        }
        .hero-stat .num {
            font-size: 3rem;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }
        .hero-stat .label {
            font-size: 0.9rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #aaa;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        /* ===== UGC REVIEW CARDS ===== */
        .review-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: var(--space-gap);
            margin-top: 48px;
        }
        .review-card {
            background: #111;
            border: var(--border-thick);
            padding: 36px 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transform: rotate(var(--rot, 0deg));
            position: relative;
        }
        .review-card:nth-child(odd) {
            --rot: -2deg;
        }
        .review-card:nth-child(even) {
            --rot: 1deg;
        }
        .review-card::before {
            content: '"';
            position: absolute;
            top: -10px;
            left: 12px;
            font-size: 5rem;
            color: var(--accent);
            opacity: 0.4;
            line-height: 1;
            font-family: Impact, sans-serif;
        }
        .review-card .stars {
            color: var(--accent);
            font-size: 1.6rem;
            letter-spacing: 4px;
        }
        .review-card .review-text {
            font-size: 1.1rem;
            line-height: 1.5;
            font-weight: 400;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #ddd;
            flex: 1;
        }
        .review-card .review-author {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            border-top: 2px solid #333;
            padding-top: 12px;
            display: flex;
            justify-content: space-between;
            color: #aaa;
        }
        .review-card .review-author .name {
            color: var(--secondary);
        }

        /* ===== COMPARISON TABLE ===== */
        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            border: 4px solid #222;
            margin-top: 48px;
        }
        .comp-cell {
            padding: 24px 20px;
            border: 1px solid #222;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 1rem;
            font-weight: 400;
        }
        .comp-cell.header {
            background: #1a1a1a;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            color: var(--accent);
            border-color: #333;
        }
        .comp-cell.accent {
            color: var(--accent);
            font-weight: 700;
        }

        /* ===== ASYMMETRIC BLOCK ===== */
        .asymmetric-block {
            display: grid;
            grid-template-columns: 1.5fr 1fr;
            gap: var(--space-gap);
            align-items: center;
        }
        .asymmetric-block.reverse {
            grid-template-columns: 1fr 1.5fr;
        }
        .block-visual {
            border: var(--border-accent);
            padding: 60px 40px;
            background: #0a0a0a;
            transform: rotate(2deg);
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: var(--accent);
            text-align: center;
            line-height: 1.1;
        }
        .block-visual.reverse-rotate {
            transform: rotate(-2deg);
        }

        /* ===== CONTACT / CTA ===== */
        .cta-block {
            background: var(--accent);
            color: var(--primary);
            border: var(--border-thick);
            padding: 60px var(--space-padding);
            text-align: center;
            margin-top: var(--space-section);
        }
        .cta-block h2 {
            color: var(--primary);
            border-left-color: var(--primary);
        }
        .cta-block .phone-link {
            display: inline-block;
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            border: 4px solid var(--primary);
            padding: 16px 48px;
            margin-top: 24px;
            transition: background 0.2s, color 0.2s;
        }
        .cta-block .phone-link:hover {
            background: var(--primary);
            color: var(--accent);
        }

        /* ===== FOOTER ===== */
        footer {
            padding: 48px var(--space-padding);
            border-top: var(--border-thick);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
            font-size: 0.9rem;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        footer a {
            color: #888;
            border-bottom: 2px solid transparent;
        }
        footer a:hover {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            :root {
                --space-padding: 32px;
                --space-section: 80px;
                --space-gap: 32px;
            }
            header {
                padding: 16px var(--space-padding);
            }
            .logo {
                font-size: 1.4rem;
                padding: 6px 16px;
            }
            nav {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: var(--primary);
                flex-direction: column;
                padding: 24px var(--space-padding);
                border-bottom: var(--border-thick);
                gap: 24px;
            }
            nav.open {
                display: flex;
            }
            nav a {
                font-size: 1.4rem;
            }
            .nav-phone {
                align-self: flex-start;
                font-size: 1rem;
                padding: 8px 20px;
            }
            .hamburger {
                display: flex;
            }
            .grid-2, .grid-3, .asymmetric-block, .asymmetric-block.reverse {
                grid-template-columns: 1fr;
            }
            .comparison-grid {
                grid-template-columns: 1fr 1fr;
                font-size: 0.9rem;
            }
            .comp-cell {
                padding: 16px 12px;
            }
            .hero h1 {
                font-size: clamp(2.8rem, 10vw, 4rem);
            }
            .hero-stats {
                gap: 24px;
            }
            .hero-stat {
                min-width: 120px;
                padding: 16px 20px;
            }
            .hero-stat .num {
                font-size: 2.2rem;
            }
            .cta-block .phone-link {
                font-size: 2rem;
                padding: 12px 32px;
            }
            footer {
                flex-direction: column;
                text-align: center;
                padding: 32px var(--space-padding);
            }
            .block-visual {
                padding: 40px 24px;
                min-height: 200px;
                font-size: 2rem;
            }
            .review-card {
                transform: none !important;
            }
        }

        @media (max-width: 480px) {
            :root {
                --space-padding: 20px;
                --space-section: 60px;
                --space-gap: 24px;
            }
            h1 {
                font-size: clamp(2.2rem, 8vw, 3rem);
            }
            h2 {
                font-size: clamp(1.8rem, 6vw, 2.8rem);
            }
            .comparison-grid {
                grid-template-columns: 1fr;
            }
            .hero-stat {
                min-width: 100%;
                transform: none;
            }
        }
    </style>
</head>

        <div class="logo">
            <span>MW</span> CLUB <span>⚡</span>
        </div>
        <nav id="main-nav" role="navigation" aria-label="메인 네비게이션">
            <a href="#compare">비교</
</body>
